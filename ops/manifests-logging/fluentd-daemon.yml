---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: fluentd
  labels:
    tier: monitoring
    name: fluentd
  namespace: kube-system
spec:
  selector:
    matchLabels:
      name: fluentd
  template:
    metadata:
      labels:
        name: fluentd
    spec:
      serviceAccountName: fluentd
      containers:
      - image: fluent/fluentd-kubernetes-daemonset:v1-debian-elasticsearch
        name: fluentd
        env:
        - name: FLUENTD_CONF
          value: fluentd.conf
        volumeMounts:
        - name: varlog
          mountPath: /var/log
        - name: varlibdockercontainers
          mountPath: /var/lib/docker/containers
          readOnly: true
        - name: config
          mountPath: /fluentd/etc
        - name: output
          mountPath: /var/log/fluentd
      volumes:
      - name: varlog
        hostPath:
          path: /var/log
      - name: varlibdockercontainers
        hostPath:
          path: /var/lib/docker/containers
      - name: config
        configMap:
          name: fluentd-config
      - name: output
        hostPath:
          path: /var/log/fluentd
          type: DirectoryOrCreate
      nodeSelector:
        kubernetes.io/os: linux